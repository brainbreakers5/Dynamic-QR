<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dynamicQR - Get Started</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/api.js"></script>
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">

  <div class="glass-panel animate-fade-in" style="width: 100%; max-width: 420px;">
    <div style="text-align: center; margin-bottom: 32px;">
      <h2 style="font-size: 2rem; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Get Started
      </h2>
      <p>Create a free account to generate dynamic QR codes</p>
    </div>

    <form id="signup-form">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input id="name" type="text" class="form-input" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input id="email" type="email" class="form-input" placeholder="name@domain.com" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-input" placeholder="••••••••" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px; padding: 14px;" id="signup-btn">
        Sign Up
      </button>
    </form>

    <div style="text-align: center; margin-top: 24px;">
      <p style="font-size: 0.9rem;">
        Already have an account? 
        <a href="/login" style="color: var(--accent-secondary); font-weight: 600; text-decoration: none;">Sign In</a>
      </p>
    </div>
  </div>

  <script>
    checkNotAuth(); // Redirect to dashboard if already logged in

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const signupBtn = document.getElementById('signup-btn');

      if (password !== confirmPassword) {
        showToast('Passwords do not match.', 'error');
        return;
      }
      if (password.length < 6) {
        showToast('Password must be at least 6 characters long.', 'error');
        return;
      }

      const gmailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
      if (!gmailRegex.test(email)) {
        showToast('Please use a valid Gmail address (@gmail.com).', 'error');
        return;
      }

      signupBtn.disabled = true;
      signupBtn.innerText = 'Creating account...';

      try {
        const res = await apiRequest('/auth/signup', 'POST', { name, email, password });
        localStorage.setItem('qr_auth_token', res.token);
        localStorage.setItem('qr_user', JSON.stringify(res.user));
        showToast('Account created successfully!', 'success');
        setTimeout(() => window.location.href = '/dashboard', 800);
      } catch (err) {
        showToast(err.message || 'Error creating account.', 'error');
        signupBtn.disabled = false;
        signupBtn.innerText = 'Sign Up';
      }
    });
  </script>
</body>
</html>
