<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dynamicQR - Welcome Back</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/api.js"></script>
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">

  <div class="glass-panel animate-fade-in" style="width: 100%; max-width: 420px;" id="auth-card">
    <!-- State 1: Login Form -->
    <div id="login-state">
      <div style="text-align: center; margin-bottom: 32px;">
        <h2 style="font-size: 2rem; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
          Welcome Back
        </h2>
        <p>Log in to manage your dynamic QR codes</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input id="email" type="email" class="form-input" placeholder="name@domain.com" required>
        </div>

        <div class="form-group">
          <div class="form-label">
            <label for="password">Password</label>
            <a href="#" id="forgot-password-link" style="color: var(--accent-primary); font-size: 0.85rem; text-decoration: none;">
              Forgot Password?
            </a>
          </div>
          <input id="password" type="password" class="form-input" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px; padding: 14px;" id="login-btn">
          Sign In
        </button>
      </form>

      <div style="text-align: center; margin-top: 24px;">
        <p style="font-size: 0.9rem;">
          Don't have an account? 
          <a href="/signup" style="color: var(--accent-secondary); font-weight: 600; text-decoration: none;">Sign Up</a>
        </p>
      </div>
    </div>

    <!-- State 2: Forgot Password Email Entry -->
    <div id="forgot-email-state" style="display: none;">
      <div style="text-align: center; margin-bottom: 32px;">
        <h2 style="font-size: 2rem; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
          Reset Password
        </h2>
        <p>Enter your Gmail address to receive a verification code</p>
      </div>

      <form id="forgot-email-form">
        <div class="form-group">
          <label class="form-label" for="reset-email">Email Address</label>
          <input id="reset-email" type="email" class="form-input" placeholder="name@domain.com" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px; padding: 14px;" id="send-code-btn">
          Send Verification Code
        </button>
      </form>

      <div style="text-align: center; margin-top: 24px;">
        <a href="#" id="back-to-login-link-1" style="color: var(--accent-secondary); font-weight: 600; font-size: 0.9rem; text-decoration: none;">
          Back to Login
        </a>
      </div>
    </div>

    <!-- State 3: Verify Reset Code & New Password -->
    <div id="forgot-verify-state" style="display: none;">
      <div style="text-align: center; margin-bottom: 32px;">
        <h2 style="font-size: 2rem; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
          Verify Reset
        </h2>
        <p id="verify-info-text">Enter the 6-digit code sent to your email</p>
      </div>

      <form id="forgot-verify-form">
        <div class="form-group">
          <label class="form-label" for="verify-code">Verification Code</label>
          <input id="verify-code" type="text" class="form-input" placeholder="123456" maxlength="6" pattern="\d{6}" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <input id="new-password" type="password" class="form-input" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px; padding: 14px;" id="reset-password-btn">
          Reset Password
        </button>
      </form>

      <div style="text-align: center; margin-top: 24px;">
        <a href="#" id="back-to-login-link-2" style="color: var(--accent-secondary); font-weight: 600; font-size: 0.9rem; text-decoration: none;">
          Back to Login
        </a>
      </div>
    </div>
  </div>

  <script>
    checkNotAuth(); // Redirect to dashboard if already logged in

    // Show expired query toast
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('expired')) {
      showToast('Your session has expired. Please log in again.', 'error');
    }

    const loginState = document.getElementById('login-state');
    const forgotEmailState = document.getElementById('forgot-email-state');
    const forgotVerifyState = document.getElementById('forgot-verify-state');

    const emailInput = document.getElementById('email');
    const resetEmailInput = document.getElementById('reset-email');

    // Navigation triggers
    document.getElementById('forgot-password-link').addEventListener('click', (e) => {
      e.preventDefault();
      resetEmailInput.value = emailInput.value;
      loginState.style.display = 'none';
      forgotEmailState.style.display = 'block';
    });

    const backToLogin = (e) => {
      e.preventDefault();
      loginState.style.display = 'block';
      forgotEmailState.style.display = 'none';
      forgotVerifyState.style.display = 'none';
    };

    document.getElementById('back-to-login-link-1').addEventListener('click', backToLogin);
    document.getElementById('back-to-login-link-2').addEventListener('click', backToLogin);

    // 1. Submit Login Form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('login-btn');

      const gmailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
      if (!gmailRegex.test(email)) {
        showToast('Please use a valid Gmail address (@gmail.com).', 'error');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerText = 'Logging in...';

      try {
        const res = await apiRequest('/auth/login', 'POST', { email, password });
        localStorage.setItem('qr_auth_token', res.token);
        localStorage.setItem('qr_user', JSON.stringify(res.user));
        showToast('Logged in successfully!', 'success');
        setTimeout(() => window.location.href = '/dashboard', 800);
      } catch (err) {
        showToast(err.message || 'Invalid credentials.', 'error');
        loginBtn.disabled = false;
        loginBtn.innerText = 'Sign In';
      }
    });

    // 2. Submit Send Code Form
    document.getElementById('forgot-email-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = resetEmailInput.value;
      const sendCodeBtn = document.getElementById('send-code-btn');

      const gmailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
      if (!gmailRegex.test(email)) {
        showToast('Please use a valid Gmail address (@gmail.com).', 'error');
        return;
      }

      sendCodeBtn.disabled = true;
      sendCodeBtn.innerText = 'Sending code...';

      try {
        const res = await apiRequest('/auth/forgot-password', 'POST', { email });
        if (res && res.devCode) {
          showToast(`[Dev Fallback] Verification code: ${res.devCode}`, 'success');
        } else {
          showToast('Verification code sent successfully. Check your email.', 'success');
        }
        document.getElementById('verify-info-text').innerText = `Enter the 6-digit code sent to ${email}`;
        forgotEmailState.style.display = 'none';
        forgotVerifyState.style.display = 'block';
      } catch (err) {
        showToast(err.message || 'Failed to send verification code.', 'error');
      } finally {
        sendCodeBtn.disabled = false;
        sendCodeBtn.innerText = 'Send Verification Code';
      }
    });

    // 3. Submit Reset Password Form
    document.getElementById('forgot-verify-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = resetEmailInput.value;
      const code = document.getElementById('verify-code').value;
      const newPassword = document.getElementById('new-password').value;
      const resetPasswordBtn = document.getElementById('reset-password-btn');

      if (code.length !== 6) {
        showToast('Verification code must be 6 digits.', 'error');
        return;
      }

      resetPasswordBtn.disabled = true;
      resetPasswordBtn.innerText = 'Resetting password...';

      try {
        await apiRequest('/auth/reset-password', 'POST', { email, code, newPassword });
        showToast('Password reset successfully! You can now log in.', 'success');
        document.getElementById('password').value = '';
        document.getElementById('verify-code').value = '';
        document.getElementById('new-password').value = '';
        forgotVerifyState.style.display = 'none';
        loginState.style.display = 'block';
      } catch (err) {
        showToast(err.message || 'Failed to reset password.', 'error');
      } finally {
        resetPasswordBtn.disabled = false;
        resetPasswordBtn.innerText = 'Reset Password';
      }
    });
  </script>
</body>
</html>
